<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Voice chuẩn</title>
</head>
<body>

<button onclick="speak()">Nghe giọng 🎧</button>

<script>
function speak() {
    const text = "Hello, this is a test voice"; // test tiếng Anh trước

    const utterance = new SpeechSynthesisUtterance(text);

    // lấy giọng
    let voices = speechSynthesis.getVoices();

    if (voices.length === 0) {
        speechSynthesis.onvoiceschanged = () => {
            voices = speechSynthesis.getVoices();
            utterance.voice = voices[0];
            speechSynthesis.speak(utterance);
        };
    } else {
        utterance.voice = voices[0];
        speechSynthesis.speak(utterance);
    }
}
</script>

</body>
</html>
