<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Voice chuẩn</title>
</head>
<body>

<button onclick="speak()">Nghe giọng 🎧</button>

<script>
function speak() {
    const text = "Xin chào, đây là giọng đọc tiếng Việt nè";

    const utterance = new SpeechSynthesisUtterance(text);

    let voices = speechSynthesis.getVoices();

    // tìm giọng tiếng Việt
    let voiceVN = voices.find(v => v.lang === "vi-VN");

    if (voiceVN) {
        utterance.voice = voiceVN;
    } else {
        alert("Máy bạn không có giọng tiếng Việt 😢");
        utterance.voice = voices[0]; // fallback
    }

    utterance.lang = "vi-VN";

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
}
</script>
</body>
</html>
