<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Voice chuẩn</title>
</head>
<body>

<button onclick="speak()">Nghe giọng 🎧</button>

<button onclick="speak()">Nghe giọng</button>

<script>
function speak() {
    const text = "Xin chào, đây là test giọng đọc";

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "vi-VN";

    speechSynthesis.cancel(); // fix lỗi không phát
    speechSynthesis.speak(utterance);
}
</script>
</body>
</html>
