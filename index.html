<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Voice chuẩn</title>
</head>
<body>

<button onclick="speak()">Nghe giọng 🎧</button>

<script>
function speak() {
    const text = "Dạo này mình hay tự làm mấy món đồ nhỏ nhỏ… như mấy cái móc khóa len này nè, ngồi móc từng chút thấy cũng chill lắm mà làm xong nhìn dễ thương cực, mỗi cái là một kiểu không cái nào giống cái nào luôn, nên mình nghĩ đồ handmade không chỉ là đồ dùng mà còn là chút gì đó rất riêng, nếu bạn cũng thích mấy thứ xinh xinh như vậy thì chắc bạn sẽ hiểu cảm giác này á.";

    const utterance = new SpeechSynthesisUtterance(text);

    function run() {
        let voices = speechSynthesis.getVoices();

        let voiceVN = voices.find(v => v.lang === "vi-VN");

        if (voiceVN) {
            utterance.voice = voiceVN;
        } else {
            utterance.voice = voices[0];
        }

        utterance.lang = "vi-VN";

        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }

    // đảm bảo load voice xong mới chạy
    if (speechSynthesis.getVoices().length === 0) {
        speechSynthesis.onvoiceschanged = run;
    } else {
        run();
    }
}
</script>
</body>
</html>
